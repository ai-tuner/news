<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Canvas RSS Reader - Attune</title>
    <style>
        :root {
            --bg-dark: #1a1a1a;
        }

        body,
        html {
            height: 100dvh;
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            overscroll-behavior: none;
        }

        main {
            flex: 1;
            width: 100vw;
            position: relative;
            perspective: 1080px;
            overflow: hidden;
            background: #000;
        }

        footer {
            height: 50px;
            flex-shrink: 0;
            width: 100vw;
            background: #333;
            display: flex;
            align-items: center;
            justify-content: space-around;
            color: rgb(240, 240, 240);
            z-index: 1000;
            padding: 5px;
        }

        .nav-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .article-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            background: black;
            overflow: hidden;
        }

        .article-container.active {
            display: block;
        }

        .media-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            transform: scale(1.1);
            animation: kenBurns 20s ease-in-out infinite alternate;
        }

        @keyframes kenBurns {
            0% { transform: scale(1.1) translate(0, 0); }
            100% { transform: scale(1.3) translate(-2%, -2%); }
        }

        .content-overlay {
            position: absolute;
            bottom: 0;
            width: 100%;
            max-height: 85%;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.8) 20%, black);
            color: rgb(240, 240, 240);
            line-height: 1.4;
            padding: 20px;
            box-sizing: border-box;
            /* CRITICAL: Allow clicks to pass through to canvas */
            pointer-events: none; 
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        #type-title {
            color: #f7ce46;
            text-align: left;
            font-size: 1.4rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            /* Ensure title doesn't block drawing */
            pointer-events: none;
        }

        #type-desc {
            color: #eee;
            text-align: justify;
            font-size: 1rem;
            max-height: 250px;
            overflow-y: auto;
            scrollbar-width: thin;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 8px;
            /* Allow scrolling if text is long, but this will block ink on this specific box */
            pointer-events: auto; 
        }

        .highlight-word {
            color: #fff;
            font-weight: bold;
            background: #d32f2f;
            padding: 0 2px;
            border-radius: 2px;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            /* Place canvas high enough to be seen but under UI if needed */
            z-index: 15; 
            touch-action: none;
            width: 100%;
            height: 100%;
        }

        .nav-btn {
            background: #444;
            border: 1px solid #666;
            color: white;
            padding: 8px 8px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bolder;
            font-size: 0.8rem;
            min-width: 30px;
        }

        input[type="color"] {
            border: none;
            width: 35px;
            height: 35px;
            cursor: pointer;
            border-radius: 50%;
            background: none;
        }

        .slide-up { animation: slideUp 0.6s ease-out; }

        @keyframes slideUp {
            from { transform: translateY(20%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @media (min-width: 768px) {
            #type-title { font-size: 2.2rem; }
            #type-desc { font-size: 1.3rem; max-height: 400px; }
            .nav-btn { padding: 12px 18px; font-size: 1rem; }
        }
    </style>
</head>

<body>

    <main id="app-main"></main>

    <footer>
        <div class="nav-group">
            <button class="nav-btn" onclick="prevArticle()">Prv</button>
            <button id="pauseBtn" class="nav-btn" onclick="togglePause()">Pause</button>
            <button class="nav-btn" onclick="nextArticle()">Nxt</button>
        </div>

        <div class="nav-group">
            <input type="color" id="penColor" value="#f7ce46" title="Pen Color">
            <button class="nav-btn" onclick="setTool('pen')">P</button>
            <button class="nav-btn" onclick="setTool('highlighter')">H</button>
            <button class="nav-btn" onclick="setTool('eraser')">E</button>
        </div>

        <div class="nav-group">
            <button class="nav-btn" onclick="undo()">U</button>
            <button class="nav-btn" onclick="clearCanvas()">C</button>
        </div>
    </footer>

    <script>
        const feeds = [
            "https://timesofindia.indiatimes.com/rssfeeds/-2128816011.cms",
            "https://www.thehindu.com/feeder/default.rss",
            "https://www.thehindu.com/news/national/feeder/default.rss",
            "https://www.thehindu.com/opinion/editorial/feeder/default.rss",
            "https://timesofindia.indiatimes.com/rssfeedstopstories.cms",
            "https://timesofindia.indiatimes.com/rssfeedmostrecent.cms",
            "https://timesofindia.indiatimes.com/rssfeeds/-2128936835.cms"
        ];

        let articles = [];
        let currentIndex = 0;
        let isDrawing = false;
        let ctx;
        let currentTool = 'pen';
        let autoTimer;
        let typewriterId = 0;
        let isPaused = false;
        let voices = [];

        const canvasCache = {};
        const typedCache = new Set();

        window.speechSynthesis.onvoiceschanged = () => {
            voices = window.speechSynthesis.getVoices();
        };

        async function fetchFeeds() {
            for (let url of feeds) {
                try {
                    const res = await fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(url)}`);
                    const data = await res.json();
                    if(data.items) articles = [...articles, ...data.items];
                } catch (e) { console.error("Feed error", e); }
            }
            if(articles.length > 0) renderArticle(0);
        }

        function renderArticle(index) {
            typewriterId++;
            const currentId = typewriterId;

            clearTimeout(autoTimer);
            window.speechSynthesis.cancel();

            const main = document.getElementById('app-main');
            const item = articles[index];
            if (!item) return;

            // Use content fallback and remove character limits
            const fullRawText = item.content || item.description || "";
            const cleanDescription = fullRawText.replace(/<[^>]*>?/gm, '').trim();

            main.innerHTML = `
            <div class="article-container active slide-up">
                <img class="media-bg" src="${item.enclosure?.link || 'https://via.placeholder.com/800x600?text=News'}" />
                <canvas id="drawingCanvas"></canvas>
                <div class="content-overlay">
                    <h2 id="type-title"></h2>
                    <p id="type-desc"></p>
                </div>
            </div>
        `;

            setupCanvas(index);

            const titleEl = document.getElementById('type-title');
            const descEl = document.getElementById('type-desc');

            if (typedCache.has(index)) {
                titleEl.innerHTML = item.title;
                descEl.innerHTML = cleanDescription;
                startAutoAdvance();
            } else {
                typeWriter(item.title, 'type-title', () => {
                    typeWriter(cleanDescription, 'type-desc', () => {
                        typedCache.add(index);
                        startAutoAdvance();
                    }, currentId);
                }, currentId);
            }
        }

        function typeWriter(text, elementId, callback, instanceId) {
            if (isPaused) return;

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.0;
            const selectedVoice = voices.find(v => v.lang.includes('en')) || voices[0];
            if (selectedVoice) utterance.voice = selectedVoice;

            const el = document.getElementById(elementId);

            utterance.onboundary = (event) => {
                if (instanceId !== typewriterId) return;
                const spoken = text.substring(0, event.charIndex);
                const word = text.substring(event.charIndex, event.charIndex + event.charLength);
                const rest = text.substring(event.charIndex + event.charLength);
                el.innerHTML = `${spoken}<span class="highlight-word">${word}</span>${rest}`;
                if(elementId === 'type-desc') el.scrollTop = el.scrollHeight;
            };

            utterance.onend = () => {
                if (instanceId !== typewriterId) return;
                el.innerHTML = text;
                if (callback) callback();
            };

            window.speechSynthesis.speak(utterance);
        }

        function togglePause() {
            isPaused = !isPaused;
            const btn = document.getElementById('pauseBtn');
            const bgImage = document.querySelector('.media-bg');
            btn.innerHTML = isPaused ? "Play" : "Pause";
            btn.style.background = isPaused ? "#800" : "#444";

            if (isPaused) {
                clearTimeout(autoTimer);
                window.speechSynthesis.pause();
                if (bgImage) bgImage.style.animationPlayState = 'paused';
            } else {
                window.speechSynthesis.resume();
                if (bgImage) bgImage.style.animationPlayState = 'running';
                if (typedCache.has(currentIndex)) startAutoAdvance();
            }
        }

        function startAutoAdvance() {
            clearTimeout(autoTimer);
            if (!isPaused) {
                autoTimer = setTimeout(() => nextArticle(), 8000);
            }
        }

        function setupCanvas(index) {
            const canvas = document.getElementById('drawingCanvas');
            ctx = canvas.getContext('2d');
            
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;

            if (canvasCache[index]) {
                ctx.putImageData(canvasCache[index], 0, 0);
            }

            const getPos = (e) => {
                const r = canvas.getBoundingClientRect();
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: cx - r.left, y: cy - r.top };
            };

            const onStart = (e) => {
                // If the user starts drawing on the scrollable desc box, let them scroll instead
                if (e.target.id === 'type-desc') return;
                
                isDrawing = true;
                clearTimeout(autoTimer);
                const pos = getPos(e);
                ctx.beginPath();
                ctx.moveTo(pos.x, pos.y);
            };

            const onMove = (e) => {
                if (!isDrawing) return;
                const pos = getPos(e);
                ctx.lineWidth = currentTool === 'highlighter' ? 30 : 4;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = currentTool === 'highlighter' ? 0.3 : 1.0;
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
                if (currentTool !== 'eraser') ctx.strokeStyle = document.getElementById('penColor').value;
                ctx.lineTo(pos.x, pos.y);
                ctx.stroke();
            };

            const onEnd = () => {
                if (isDrawing) {
                    isDrawing = false;
                    canvasCache[currentIndex] = ctx.getImageData(0, 0, canvas.width, canvas.height);
                }
            };

            canvas.addEventListener('mousedown', onStart);
            canvas.addEventListener('mousemove', onMove);
            window.addEventListener('mouseup', onEnd);
            canvas.addEventListener('touchstart', (e) => { 
                if (e.target.id !== 'type-desc') {
                    onStart(e); 
                    e.preventDefault(); 
                }
            }, { passive: false });
            canvas.addEventListener('touchmove', (e) => { 
                if (isDrawing) {
                    onMove(e); 
                    e.preventDefault(); 
                }
            }, { passive: false });
            canvas.addEventListener('touchend', onEnd);
        }

        function setTool(tool) { currentTool = tool; }
        function undo() { clearCanvas(); }
        function clearCanvas() {
            if(!ctx) return;
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
            delete canvasCache[currentIndex];
        }

        function nextArticle() {
            if (currentIndex < articles.length - 1) {
                currentIndex++;
                renderArticle(currentIndex);
            } else {
                currentIndex = 0;
                renderArticle(0);
            }
        }

        function prevArticle() {
            if (currentIndex > 0) {
                currentIndex--;
                renderArticle(currentIndex);
            }
        }

        fetchFeeds();
    </script>
</body>

</html>
